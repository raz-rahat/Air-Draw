<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>নিয়ন এয়ার ড্র — Neon Air Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#e9eefc;
    --muted:#8b93b0;
    --panel:rgba(14,18,32,.62);
    --line:rgba(255,255,255,.10);
    --accent:#00f0ff;
    --bn:'Hind Siliguri',system-ui,sans-serif;
    --display:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#06080f;color:var(--ink);font-family:var(--bn);}
  #stage{position:fixed;inset:0;}

  /* layers */
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
       transform:scaleX(-1);background:#06080f;transition:opacity .4s;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  #draw{z-index:2;} #cursor{z-index:3;pointer-events:none;}

  /* faint vignette + grid so it never looks flat */
  #stage::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 30%,transparent 55%,rgba(2,4,10,.55) 100%);}

  /* ---------- brand ---------- */
  .brand{position:absolute;top:18px;left:18px;z-index:5;display:flex;align-items:center;gap:10px;
    padding:9px 14px;border-radius:14px;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  .spark{width:18px;height:18px;border-radius:5px;
    background:conic-gradient(from 0deg,#00f0ff,#b14bff,#ff2bd6,#00f0ff);
    box-shadow:0 0 14px #00f0ff99;animation:spin 6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand b{font-family:var(--display);letter-spacing:.3px;font-size:14px;}
  .brand span{font-size:11px;color:var(--muted);}

  /* ---------- status pill ---------- */
  #status{position:absolute;top:18px;right:18px;z-index:5;display:flex;align-items:center;gap:8px;
    padding:9px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-size:13px;color:var(--muted);}
  #dot{width:9px;height:9px;border-radius:50%;background:#566;box-shadow:0 0 0 0 rgba(0,240,255,0);transition:.2s;}
  #status.live #dot{background:#00f0ff;box-shadow:0 0 12px #00f0ff;}
  #status.draw #dot{background:#aaff00;box-shadow:0 0 12px #aaff00;}

  /* ---------- toolbar ---------- */
  .bar{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:5;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;max-width:94vw;
    padding:12px 16px;border-radius:20px;background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 10px 40px rgba(0,0,0,.45);}
  .swatches{display:flex;gap:9px;}
  .sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;
    transition:transform .12s,border-color .12s;}
  .sw:hover{transform:scale(1.12);}
  .sw.on{border-color:#fff;transform:scale(1.15);}
  .sep{width:1px;height:30px;background:var(--line);}
  .ctrl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
  input[type=range]{appearance:none;width:84px;height:4px;border-radius:4px;
    background:rgba(255,255,255,.16);outline:none;}
  input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 10px var(--accent);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;
    background:var(--accent);box-shadow:0 0 10px var(--accent);cursor:pointer;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:12px;cursor:pointer;
    font-family:var(--bn);font-size:13px;color:var(--ink);border:1px solid var(--line);
    background:rgba(255,255,255,.05);transition:.15s;}
  .btn:hover{background:rgba(255,255,255,.12);}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn.primary{background:linear-gradient(135deg,#00f0ff,#b14bff);color:#04101a;border:none;font-weight:600;}

  .hint{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);z-index:5;
    font-size:13px;color:var(--muted);background:rgba(6,8,15,.5);padding:6px 14px;border-radius:999px;
    border:1px solid var(--line);text-align:center;transition:opacity .4s;}

  /* ---------- start overlay ---------- */
  #gate{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;text-align:center;padding:24px;
    background:radial-gradient(140% 100% at 50% 0%,#0c1226,#06080f 70%);}
  #gate h1{font-family:var(--display);font-size:clamp(30px,7vw,56px);line-height:1.05;font-weight:700;
    background:linear-gradient(120deg,#00f0ff,#b14bff,#ff2bd6);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #gate p{max-width:440px;color:var(--muted);font-size:15px;line-height:1.7;}
  #gate .steps{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
  #gate .step{font-size:13px;color:var(--ink);background:rgba(255,255,255,.04);
    border:1px solid var(--line);padding:10px 14px;border-radius:14px;max-width:160px;}
  #gate .step b{display:block;font-family:var(--display);color:var(--accent);margin-bottom:2px;}
  #go{font-size:17px;padding:14px 30px;}
  #err{color:#ff6b8a;font-size:14px;min-height:20px;max-width:420px;}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;display:none;}
  @media (prefers-reduced-motion:reduce){.spark,.spinner{animation:none}}
</style>
</head>
<body>
<div id="stage">
  <video id="cam" playsinline muted></video>
  <canvas id="draw"></canvas>
  <canvas id="cursor"></canvas>

  <div class="brand"><span class="spark"></span><span><b>নিয়ন এয়ার ড্র</b><br><span>Neon Air Draw</span></span></div>
  <div id="status"><span id="dot"></span><span id="statusText">প্রস্তুত হচ্ছে…</span></div>

  <div class="hint" id="hint">তর্জনী আঙুল তুলে বাতাসে আঁকো · হাত খুলে দিলে থামবে</div>

  <div class="bar">
    <div class="swatches" id="swatches"></div>
    <div class="sep"></div>
    <div class="ctrl">কলম <input type="range" id="size" min="2" max="20" value="7"></div>
    <div class="ctrl">আলো <input type="range" id="glow" min="3" max="22" value="13"></div>
    <div class="sep"></div>
    <button class="btn" id="clear">🗑️ মুছে ফেলো</button>
    <button class="btn" id="cam-toggle">📷 ক্যামেরা</button>
    <button class="btn primary" id="save">⬇️ সেভ</button>
  </div>

  <div id="gate">
    <h1>বাতাসে আলো দিয়ে লেখো</h1>
    <p>তোমার ওয়েবক্যামের সামনে হাত তুলে তর্জনী আঙুল দিয়ে শূন্যে আঁকো — স্ক্রিনে নিয়ন আলো হয়ে ফুটে উঠবে।</p>
    <div class="steps">
      <div class="step"><b>১</b>ক্যামেরার অনুমতি দাও</div>
      <div class="step"><b>২</b>তর্জনী তুলে আঁকো</div>
      <div class="step"><b>৩</b>হাত খুলে থামো</div>
    </div>
    <button class="btn primary" id="go"><span class="spinner" id="sp"></span><span id="goText">▶ শুরু করো</span></button>
    <div id="err"></div>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10/vision_bundle.mjs";

/* ---------- elements ---------- */
const video   = document.getElementById('cam');
const draw    = document.getElementById('draw');
const cursor  = document.getElementById('cursor');
const dctx    = draw.getContext('2d');
const cctx    = cursor.getContext('2d');
const statusEl= document.getElementById('status');
const statusT = document.getElementById('statusText');
const hint    = document.getElementById('hint');

/* ---------- palette ---------- */
const COLORS = ['#00f0ff','#aaff00','#ff2bd6','#ff8a00','#b14bff','#ff0040','#ffd000','#ffffff'];
let color = COLORS[0], brush = 7, glow = 13;

const swEl = document.getElementById('swatches');
COLORS.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='sw'+(i===0?' on':''); b.style.background=c; b.setAttribute('aria-label','রঙ '+c);
  b.onclick=()=>{color=c; document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on')); b.classList.add('on');};
  swEl.appendChild(b);
});
document.getElementById('size').oninput = e=> brush = +e.target.value;
document.getElementById('glow').oninput = e=> glow  = +e.target.value;
document.getElementById('clear').onclick = ()=> dctx.clearRect(0,0,W,H);

/* ---------- canvas sizing (keeps drawing on resize) ---------- */
let W=innerWidth, H=innerHeight, DPR=Math.min(devicePixelRatio||1,2);
function fit(){
  const prev=document.createElement('canvas'); prev.width=draw.width; prev.height=draw.height;
  prev.getContext('2d').drawImage(draw,0,0);
  W=innerWidth; H=innerHeight; DPR=Math.min(devicePixelRatio||1,2);
  for(const cv of [draw,cursor]){ cv.width=W*DPR; cv.height=H*DPR; }
  dctx.setTransform(DPR,0,0,DPR,0,0); cctx.setTransform(DPR,0,0,DPR,0,0);
  if(prev.width) dctx.drawImage(prev,0,0,prev.width/DPR,prev.height/DPR);
}
addEventListener('resize',fit); fit();

/* ---------- neon stroke ---------- */
function neon(x1,y1,x2,y2){
  dctx.save();
  dctx.globalCompositeOperation='lighter';
  dctx.lineCap='round'; dctx.lineJoin='round'; dctx.shadowColor=color;
  const seg=(w,blur,a,stroke)=>{dctx.beginPath();dctx.moveTo(x1,y1);dctx.lineTo(x2,y2);
    dctx.lineWidth=w;dctx.shadowBlur=blur;dctx.globalAlpha=a;dctx.strokeStyle=stroke;dctx.stroke();};
  seg(brush*2.4, glow*1.4, .45, color);   // wide soft halo
  seg(brush*1.3, glow,     .8 , color);   // mid glow
  seg(brush*0.45,glow*0.4, .95,'#ffffff'); // bright core (neon tube)
  dctx.restore();
}

/* ---------- map landmark -> mirrored screen (object-fit cover) ---------- */
function toScreen(nx,ny){
  const vw=video.videoWidth, vh=video.videoHeight;
  const s=Math.max(W/vw, H/vh), dw=vw*s, dh=vh*s, ox=(W-dw)/2, oy=(H-dh)/2;
  return { x: W-(ox+nx*dw), y: oy+ny*dh };   // W- … mirrors X to match flipped video
}

/* ---------- state ---------- */
let landmarker=null, stream=null, running=false, camOn=true;
let last=null, sm=null;                     // last drawn point, smoothed point

function setStatus(text,mode){ statusT.textContent=text;
  statusEl.classList.remove('live','draw'); if(mode) statusEl.classList.add(mode); }

function loop(){
  if(running && camOn && video.readyState>=2){
    const res = landmarker.detectForVideo(video, performance.now());
    handle(res);
  }
  requestAnimationFrame(loop);
}

function handle(res){
  cctx.clearRect(0,0,W,H);
  if(!res.landmarks || !res.landmarks.length){ last=null; sm=null; setStatus('হাত খুঁজছি…','live'); return; }
  const lm=res.landmarks[0];
  const pointing = (lm[8].y < lm[6].y) && (lm[12].y > lm[10].y); // index up + middle down

  let p=toScreen(lm[8].x, lm[8].y);
  sm = sm ? {x:sm.x*.45+p.x*.55, y:sm.y*.45+p.y*.55} : p;  // smoothing
  p=sm;

  // fingertip cursor
  cctx.save(); cctx.shadowColor=color; cctx.shadowBlur=pointing?22:10;
  cctx.fillStyle=pointing?color:'rgba(255,255,255,.85)';
  cctx.beginPath(); cctx.arc(p.x,p.y,pointing?9:6,0,7); cctx.fill();
  cctx.lineWidth=2; cctx.strokeStyle=color; cctx.globalAlpha=.6;
  cctx.beginPath(); cctx.arc(p.x,p.y,pointing?17:12,0,7); cctx.stroke(); cctx.restore();

  if(pointing){
    if(last){
      const d=Math.hypot(p.x-last.x,p.y-last.y);
      if(d < Math.min(W,H)*0.28) neon(last.x,last.y,p.x,p.y); // skip wild jumps
    }
    last=p; setStatus('আঁকছো ✍️','draw');
  } else { last=null; setStatus('থেমে আছো','live'); }
}

/* ---------- save composite (video + neon) ---------- */
document.getElementById('save').onclick = ()=>{
  const t=document.createElement('canvas'); t.width=W; t.height=H; const c=t.getContext('2d');
  c.fillStyle='#06080f'; c.fillRect(0,0,W,H);
  if(camOn && video.videoWidth){
    c.save(); c.translate(W,0); c.scale(-1,1);            // mirror like display
    const vw=video.videoWidth, vh=video.videoHeight, s=Math.max(W/vw,H/vh);
    const dw=vw*s, dh=vh*s; c.drawImage(video,(W-dw)/2,(H-dh)/2,dw,dh); c.restore();
  }
  c.drawImage(draw,0,0,W,H);
  const a=document.createElement('a'); a.download='neon-air-draw.png'; a.href=t.toDataURL('image/png'); a.click();
};

/* ---------- camera on/off ---------- */
document.getElementById('cam-toggle').onclick = ()=>{
  camOn=!camOn; video.style.opacity=camOn?1:0;
};

/* ---------- start ---------- */
const gate=document.getElementById('gate'), go=document.getElementById('go');
const sp=document.getElementById('sp'), goText=document.getElementById('goText'), err=document.getElementById('err');

go.onclick = async ()=>{
  err.textContent=''; sp.style.display='inline-block'; goText.textContent='চালু হচ্ছে…'; go.disabled=true;
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'user',width:1280,height:720}, audio:false });
    video.srcObject=stream; await video.play();

    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10/wasm");
    landmarker = await HandLandmarker.createFromOptions(vision,{
      baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate:"GPU" },
      runningMode:"VIDEO", numHands:1
    });

    running=true; gate.style.display='none'; setStatus('হাত খুঁজছি…','live'); loop();
    setTimeout(()=>{hint.style.opacity=0;},6000);
  }catch(e){
    console.error(e);
    err.textContent = e.name==='NotAllowedError'
      ? 'ক্যামেরার অনুমতি দরকার। ব্রাউজার সেটিংসে অনুমতি দিয়ে আবার চেষ্টা করো।'
      : 'চালু করা গেল না — সাইটটি https বা localhost-এ চালাও। (' + (e.message||e.name) + ')';
    sp.style.display='none'; goText.textContent='▶ আবার চেষ্টা করো'; go.disabled=false;
  }
};
</script>
</body>
</html>
